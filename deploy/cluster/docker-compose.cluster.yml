version: "3.8"

x-backend-common: &backend-common
  build: ./backend
  restart: unless-stopped
  environment:
    DATABASE_URL: postgresql+psycopg2://face:${DB_PASSWORD:-face123}@postgres:5432/facedb
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    S3_ENDPOINT: minio:9000
    S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
    S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
    S3_USE_SSL: "false"
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_healthy

services:
  nginx:
    image: nginx:alpine
    container_name: face-scan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3

  backend-1:
    <<: *backend-common
    container_name: face-scan-backend-1

  backend-2:
    <<: *backend-common
    container_name: face-scan-backend-2

  backend-3:
    <<: *backend-common
    container_name: face-scan-backend-3

  postgres:
    image: postgres:15-alpine
    container_name: face-scan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: facedb
      POSTGRES_USER: face
      POSTGRES_PASSWORD: ${DB_PASSWORD:-face123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U face -d facedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: face-scan-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: face-scan-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin123}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: face-scan-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  grafana:
    image: grafana/grafana:latest
    container_name: face-scan-grafana
    restart: unless-stopped
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}

volumes:
  postgres-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data: