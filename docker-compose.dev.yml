version: "3.8"

# 开发环境配置 — 支持后端代码热重载
# 使用: docker compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: face-scan-backend-dev
    restart: unless-stopped
    environment:
      - DEBUG=true
      - DATABASE_URL=sqlite:///./data/face_scan.db
      - JWT_SECRET_KEY=dev-secret-key-change-in-production
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
    volumes:
      - ./backend/app:/app/app
      - backend-data:/app/data
      - backend-models:/app/models
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m app.init_db &&
             python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 120"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=
        - VITE_WS_URL=
    container_name: face-scan-frontend-dev
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  backend-data:
  backend-models:
