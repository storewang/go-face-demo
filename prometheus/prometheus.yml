global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'face-scan-backend'
    metrics_path: '/metrics'
    kubernetes_sd_configs:
    - role: pod
      namespaces:
        names: ['face-scan']
    relabel_configs:
    - source_labels: [__meta_kubernetes_pod_label_app]
      regex: face-scan-backend
      action: keep